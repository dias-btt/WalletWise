name: wallet_wise
description: WalletWise - Personal Finance & Digital Wallet Portfolio App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

isar_version: &isar_version 3.3.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # DI
  get_it: ^8.2.0
  injectable: ^2.5.1

  # Routing
  go_router: ^16.0.0

  # Network
  dio: ^5.8.0
  retrofit: ^4.4.2

  # Supabase
  supabase_flutter: ^2.9.1

  # Local DB (isar_community — maintained fork; original isar conflicts with codegen on Dart 3.11)
  isar_community: *isar_version
  isar_community_flutter_libs: *isar_version
  path_provider: ^2.1.5

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Forms
  reactive_forms: ^17.0.1

  # UI
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  fpdart: ^1.1.1
  envied: ^1.1.1

  # Other
  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  share_plus: ^11.0.0
  csv: ^6.0.0
  flutter_local_notifications: ^19.2.1
  sentry_flutter: ^8.14.2

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # DI
  build_runner: ^2.5.4
  injectable_generator: ^2.8.1

  # Network
  retrofit_generator: ^10.2.7

  # Models
  freezed: ^3.0.6
  json_serializable: ^6.9.5

  # Utils
  envied_generator: ^1.1.1

  # Local DB
  isar_community_generator: *isar_version

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: dias-btt
