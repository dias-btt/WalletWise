name: wallet_wise
description: WalletWise - Personal Finance & Digital Wallet Portfolio App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^16.0.0

  # Backend
  supabase_flutter: ^2.9.1

  # Environment
  flutter_dotenv: ^5.2.1

  # Dependency Injection
  get_it: ^8.2.0
  injectable: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.5.4
  injectable_generator: ^2.8.1

flutter:
  uses-material-design: true

  assets:
    - .env